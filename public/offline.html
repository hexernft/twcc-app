<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TWCC Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #101b3d;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        padding: 24px;
      }

      .card {
        max-width: 520px;
        border: 1px solid rgba(247, 231, 206, 0.35);
        background: rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        padding: 32px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }

      .logo {
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
        border: 1px solid rgba(247, 231, 206, 0.7);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f7e7ce;
        font-weight: 900;
        letter-spacing: 2px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.7;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="logo">TWCC</div>
      <h1>You are offline</h1>
      <p>
        The World Class Choir portal needs an internet connection to load the
        latest announcements, rehearsals, songs, and member information.
      </p>
    </main>
  </body>
</html>
